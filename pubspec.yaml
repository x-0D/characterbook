name: characterbook
description: "Implementation of the Character Book app on the Flutter framework"
version: 1.7.1+36
publish_to: 'MaxGog'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: '>=3.0.0'

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon.svg
    - assets/iconapp.png
    - assets/underdeveloped.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSans-Italic.ttf
    - assets/fonts/GoogleSans.ttf
    - assets/github-mark.png
    - assets/avatardeveloper.jpg

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  provider: ^6.0.5
  flutter_bloc: ^9.1.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.2

  intl: ^0.20.2

  pdf: ^3.10.0
  printing: ^5.9.1

  file_selector: ^1.0.4
  image_picker: ^1.1.2
  open_filex: ^4.7.0
  cross_file: ^0.3.3

  url_launcher: ^6.1.11
  share_plus: ^12.0.1

  google_sign_in: ^6.1.5
  googleapis: ^15.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.3

  json_annotation: ^4.8.1

  flutter_markdown: ^0.6.15

  universal_html: ^2.2.1

  table_calendar: ^3.0.9

  crop_image: ^1.0.16
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_gen: ^5.9.0

  intl_utils: ^2.8.8

  flutter_launcher_icons: ^0.14.4

  analyzer: ^6.4.1

  msix: ^3.16.10


flutter_intl:
  enabled: true
  class_name: "S"
  main_locale: "ru"
  arb_dir: "lib/l10n"
  output_dir: "lib/generated"

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/icon.svg"